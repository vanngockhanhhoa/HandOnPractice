_format_version: "3.0"

# ─── Flow ───────────────────────────────────────────────────────────────────
#
#  FE  ──►  Kong :8000
#               ├──  /realms/**          →  Keycloak         (no JWT check)
#               ├──  /auth|/actuator|/health  →  App public  (no JWT check)
#               └──  /**                 →  App protected    (Kong verifies Keycloak JWT)
#
# Kong verifies RS256 signature + exp claim using Keycloak's public key.
# The Bearer token is forwarded unchanged so Spring Boot can decode claims.
# ────────────────────────────────────────────────────────────────────────────

consumers:
  - username: keycloak
    jwt_secrets:
      - key: "http://localhost:8180/realms/ash"   # must match `iss` claim
        algorithm: RS256
        rsa_public_key: |
          -----BEGIN PUBLIC KEY-----
          MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEAvCkQF3NRk6oN08qABKbc
          qOBCwK5gOq3Yg0SSp4bzpTtW9RVl+I5N2F905anAsnlLELP7C2TqoHp4PkDxDpll
          msBuCy1kf9WmSXP1VPQT6Zz6q/Jqu10mcwkitbzFkMYlkAC/iGkNLPUOu55Ywxbt
          4c/w0gZbGiZzdjZHC2XijvjtjZ1zBD/oFOE/0BN/YQWkKp7fo8DiSVTq9NGEETs0
          IgD1oyqt2HQUZWjEc92Am+Gtg/OPmsWX4Url5ViBlvJK5EnfQAWOQcq18FqOsPXZ
          t4BuvnS5+DX8zdVwgd8NohrStGJByzgVD8IEnXA1ju6fSpPEEK49nOZCmcEPYKHs
          JwIDAQAB
          -----END PUBLIC KEY-----

services:

  # Keycloak – token, JWKS, authorization endpoints (no auth required)
  - name: keycloak-service
    url: http://keycloak:8080
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    routes:
      - name: keycloak-route
        paths:
          - ~/realms
        strip_path: false

  # Spring Boot app
  - name: app-service
    url: http://host.docker.internal:8080
    connect_timeout: 10000
    read_timeout: 60000
    write_timeout: 60000
    routes:

      # Public endpoints — no JWT required
      - name: app-public-route
        paths:
          - /auth
          - /actuator
          - /health
        strip_path: false

      # Protected endpoints — Kong verifies Keycloak JWT before forwarding
      - name: app-protected-route
        paths:
          - /
        strip_path: false
        plugins:
          - name: jwt
            config:
              key_claim_name: iss
              claims_to_verify:
                - exp
